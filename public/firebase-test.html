<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Connection Test</title>
  <style>
    body {
      background: #000;
      color: #0f0;
      font-family: monospace;
      padding: 20px;
      font-size: 16px;
    }
    .status { margin: 10px 0; padding: 10px; background: #111; }
    .success { color: #0f0; }
    .error { color: #f00; }
  </style>
</head>
<body>
  <h1>🔥 Firebase Connection Test</h1>
  <div id="status"></div>

  <script type="module">
    const statusEl = document.getElementById('status');
    
    function log(message, isError = false) {
      const div = document.createElement('div');
      div.className = 'status ' + (isError ? 'error' : 'success');
      div.textContent = message;
      statusEl.appendChild(div);
    }

    try {
      log('✓ Starting Firebase test...');
      
      // Import Firebase
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
      const { getFirestore, collection, getDocs, addDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      
      log('✓ Firebase modules loaded');

      // Firebase config
      const firebaseConfig = {
        apiKey: "AIzaSyBboGxCfkg8ft6yj-mhNYEpOWalkgz3X4Y",
        authDomain: "smart-academic-assistant.firebaseapp.com",
        projectId: "smart-academic-assistant",
        storageBucket: "smart-academic-assistant.firebasestorage.app",
        messagingSenderId: "979256832186",
        appId: "1:979256832186:web:e68835702d41dad0eb9283"
      };

      log('✓ Initializing Firebase...');
      const app = initializeApp(firebaseConfig);
      log('✓ Firebase initialized successfully!');

      log('✓ Initializing Firestore...');
      const db = getFirestore(app);
      log('✓ Firestore initialized!');

      log('⏳ Testing Firestore connection...');
      
      // Try to create a test collection
      const testRef = collection(db, 'connection_test');
      const docRef = await addDoc(testRef, {
        message: 'Firebase connection test',
        timestamp: new Date().toISOString()
      });
      
      log('✅ SUCCESS! Firestore is working!');
      log('✅ Test document created with ID: ' + docRef.id);
      
      // Try to read it back
      const snapshot = await getDocs(testRef);
      log('✅ Retrieved ' + snapshot.size + ' documents');
      
      log('');
      log('🎉 FIREBASE IS WORKING PERFECTLY!');
      log('The problem must be in your app code, not Firebase connectivity.');
      
    } catch (error) {
      log('❌ ERROR: ' + error.message, true);
      log('❌ Error code: ' + error.code, true);
      log('❌ Full error: ' + JSON.stringify(error, null, 2), true);
      log('');
      log('🔴 FIREBASE CONNECTION FAILED!', true);
      log('This confirms there is a network/firewall issue blocking Firebase.', true);
    }
  </script>
</body>
</html>
